<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro | LoveCode</title>
    <link rel="stylesheet" href="register.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="card-header">
                <img src="logo_lovecode.png" alt="LoveCode Logo" class="logo-header-image">
                <p class="header-subtitle">Crea tu usuario</p>
            </div>
            
            <form id="form-registro">
                <input type="text" id="reg-nombre" placeholder="Nombre completo" required>
                <input type="email" id="reg-email" placeholder="Correo electrónico" required>
                <input type="password" id="reg-pass" placeholder="Contraseña" required>
                <input type="text" id="reg-ciudad" placeholder="Ciudad">
                <input type="text" id="reg-descripcion" placeholder="Cuéntanos algo sobre ti...">
                <button type="submit">Crear Cuenta</button>
            </form>

            <div class="auth-footer">
                <p>¿Ya estás en la base de datos? <a href="login.html">Log In</a></p>
            </div>
        </div>
    </div>
    <script src="Auth.js"></script>
<script>
    document.getElementById('form-registro').addEventListener('submit', ejecutarRegistro);
</script>
</body>
</html>
