<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoveCode | Dashboard</title>
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="dashboard.css">
</head>

<body>
    <nav class="navbar">
        <div class="logo">
            <img src="logo_lovecode.png" alt="LoveCode Logo" class="logo-image">
        </div>
        <div class="nav-links">
            <span id="user-greeting" style="color: white; margin-right: 15px; font-weight: bold;"></span>
            <a href="#" onclick="cerrarSesion()" class="btn-outline">Cerrar Sesión</a>
        </div>
    </nav>

    <main class="dashboard-container">
        <div class="dashboard-header">
            <h1>Descubre desarrolladores</h1>
            <p>Conecta, haz match y programa.</p>
        </div>
        
        <div class="profiles-hero">
            <div class="profiles-grid" id="profiles-grid">
                <!-- Los perfiles se cargan dinámicamente desde la BD -->
                <p style="color: #aaa; text-align: center; grid-column: 1/-1;">Cargando todos los perfiles...</p>
            </div>
        </div>

    </main>

    <footer class="footer">
        <p>&copy; 2026 LoveCode. All rights reserved. <br> Made with <span class="heart">❤</span> and code.</p>
    </footer>

    <script src="dashboard.js"></script>
</body>

</html>
