<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | LoveCode</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="card-header">
                <img src="logo_lovecode.png" alt="LoveCode Logo" class="logo-header-image">
                <p class="header-subtitle">Inicia sesión en tu servidor</p>
            </div>
            
            <form action="#" method="POST">
                <div class="input-group">
                    <label for="email">String email;</label>
                    <input type="email" id="email" placeholder="developer@lovecode.com" required>
                </div>
                
                <div class="input-group">
                    <label for="password">String password;</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>

                <button type="submit" class="auth-btn">Ejecutar (Entrar)</button>
            </form>

            <div class="auth-footer">
                <p>¿No tienes cuenta? <a href="register.html">Registrate</a></p>
            </div>
        </div>
    </div>
</body>
</html>
