<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro | LoveCode</title>
    <link rel="stylesheet" href="register.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="card-header">
                <img src="logo_lovecode.png" alt="LoveCode Logo" class="logo-header-image">
                <p class="header-subtitle">Crea tu usuario</p>
            </div>
            
            <form id="form-registro">
                <div class="input-group">
                    <label for="reg-nombre">String nombre;</label>
                    <input type="text" id="reg-nombre" placeholder="Nombre completo" required>
                </div>

                <div class="input-group">
                    <label for="reg-email">String email;</label>
                    <input type="email" id="reg-email" placeholder="developer@lovecode.com" required>
                </div>

                <div class="input-group">
                    <label for="reg-pass">String password;</label>
                    <input type="password" id="reg-pass" placeholder="••••••••" required>
                </div>

                <div class="input-group">
                    <label for="reg-ciudad">String ciudad;</label>
                    <input type="text" id="reg-ciudad" placeholder="Valencia, Madrid...">
                </div>

                <div class="input-group">
                    <label for="reg-descripcion">String descripcion;</label>
                    <input type="text" id="reg-descripcion" placeholder="Cuéntanos algo sobre ti...">
                </div>

                <div class="tech-selection">
                    <label>List&lt;Tecnologia&gt; misTecnologias;</label>
                    <div id="tech-container" class="tech-grid">
                        <!-- Se cargará dinámicamente -->
                        <p class="loading">Cargando tecnologías...</p>
                    </div>
                </div>

                <button type="submit" class="auth-btn">Ejecutar (Crear Cuenta)</button>
            </form>

            <div class="auth-footer">
                <p>¿Ya estás en la base de datos? <a href="login.html">Log In</a></p>
            </div>
        </div>
    </div>
    <script src="Auth.js"></script>
    <script>
        document.getElementById('form-registro').addEventListener('submit', ejecutarRegistro);
    </script>
</body>
</html>
